<style>

  display:flex; align-items:center; justify-content:center; font-size:34px; font-weight:800; line-height:1;
  box-shadow:0 3px 8px rgba(0,0,0,0.4); border:1px solid #c8ccd6; }

.t-good .zhe{color:#7fe6a3} .t-ok .zhe{color:#ffd96b} .t-bad .zhe{color:#ff9a8a}
.t-good{border-left:4px solid #2ecc71} .t-ok{border-left:4px solid #f0c040} .t-bad{border-left:4px solid #e8604c}
.controls { background:#16213e; border-radius:12px; padding:14px 16px; border:1px solid #0f3460; }
.row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
.lbl { font-size:12px; color:#8888aa; font-weight:600; }
.btn { padding:12px 20px; font-size:15px; font-weight:700; border-radius:9px; cursor:pointer; border:none; font-family:inherit;
  min-height:48px; box-shadow:0 2px 5px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1); touch-action:manipulation; }

.btn:not(:disabled):active { transform: scale(0.97); }

.chip { display:inline-flex; align-items:center; justify-content:center; width:46px; height:46px; border-radius:50%;
  font-weight:800; font-size:12px; color:#fff; cursor:pointer; user-select:none;
  box-shadow:0 3px 6px rgba(0,0,0,0.45), inset 0 0 0 4px rgba(255,255,255,0.16), inset 0 7px 9px rgba(255,255,255,0.18), inset 0 -9px 11px rgba(0,0,0,0.3); }
.chip.sel { outline:3px solid #ffd96b; outline-offset:2px; }
.chip-5{background:radial-gradient(circle at 50% 38%,#d9503f,#b5311f)} .chip-25{background:radial-gradient(circle at 50% 38%,#259c5b,#166a38)}
.chip-100{background:radial-gradient(circle at 50% 38%,#e8691a,#b54400)}
.hint { background:#0d2f2b; border:1.5px solid #1e5a55; color:#9fe0d6; border-radius:9px; padding:10px 14px; margin-bottom:12px; font-size:13px; }
.hint strong{color:#fff}
.res { border-radius:10px; padding:9px 13px; margin-bottom:6px; font-size:14px; font-weight:700; border:2px solid; }
.res-win{background:#0d3320;color:#2ecc71;border-color:#1e8449} .res-loss{background:#2c0f0f;color:#e74c3c;border-color:#a32d2d}

.log div{padding:1px 0}

/* stats */
.stats-page{background:#16213e;border-radius:12px;padding:18px;border:1px solid #0f3460}
.stats-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px}

.c-green{color:#2ecc71}.c-red{color:#e74c3c}.c-amber{color:#f39c12}.c-muted{color:#6688aa}
.gap-banner{border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:700}
.section{background:#0f1f3a;border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid #1a3060}
.section h3{font-size:11px;font-weight:700;color:#6688aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.cat-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.pbar{height:6px;border-radius:3px;background:#1a3060;overflow:hidden;margin-bottom:10px}
.pbar-fill{height:100%;border-radius:3px}
.hist-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid #1a3060}
.reset-link{background:none;border:none;color:#553366;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;display:block;margin:10px auto 0}
.tierbar{display:flex;height:22px;border-radius:6px;overflow:hidden;margin-top:4px;font-size:10px;font-weight:700}
.tierbar div{display:flex;align-items:center;justify-content:center;color:#06210f}

<body>
<div id="app"></div>
<script>
// ════════════ ENGINE ════════════
var PIPS=['','⚀','⚁','⚂','⚃','⚄','⚅'];
// House edge + tier metadata for every supported bet (drives teaching + grading)
var BET_META = {
  pass:{name:'Pass line', he:'1.41%', tier:'good'}, dont:{name:"Don't pass", he:'1.36%', tier:'good'},
  passOdds:{name:'Pass odds', he:'0%', tier:'good'}, dontOdds:{name:'Lay odds', he:'0%', tier:'good'},
  place6:{name:'Place 6', he:'1.52%', tier:'ok'}, place8:{name:'Place 8', he:'1.52%', tier:'ok'},
  field:{name:'Field', he:'2.78%', tier:'bad'}, any7:{name:'Any 7', he:'16.7%', tier:'bad'},
  hard6:{name:'Hard 6', he:'9.1%', tier:'bad'}, hard8:{name:'Hard 8', he:'9.1%', tier:'bad'}
};
var BAD = {field:1, any7:1, hard6:1, hard8:1};
function rollDice(){return [1+Math.floor(Math.random()*6), 1+Math.floor(Math.random()*6)];}
function oddsMult(pt){return (pt===4||pt===10)?[2,1]:(pt===5||pt===9)?[3,2]:[6,5];}   // pass odds true payout num/den
function layMult(pt){return (pt===4||pt===10)?[1,2]:(pt===5||pt===9)?[2,3]:[5,6];}     // don't odds true payout
function win(stake,nd){return Math.floor(stake*nd[0]/nd[1]);}

function freshBets(){return {pass:0,dont:0,passOdds:0,dontOdds:0,place6:0,place8:0,field:0,any7:0,hard6:0,hard8:0};}
var G = {
  screen:'game', br:1000, unit:25, chip:25,
  phase:'comeout', point:null, dice:[3,4], rollNum:0,
  bets:freshBets(),
  msgs:[{kind:'info',text:'Place a line bet and roll the come-out. Free odds are the only 0% house-edge bet — always back your line.'}],
  log:[],
  preCycleBr:1000, cyc:{hadLine:false,side:'pass',pointSet:false,line:0},
  cycleWager:0, cycleBad:0,
  optBr:1000,
  gs:{ cycles:0, optBr:1000, history:[],
       cat:{ line:{ok:0,n:0}, odds:{ok:0,n:0}, edge:{wagered:0,bad:0} },
       tier:{good:0,ok:0,bad:0} }
};

// ── PERSISTENCE ──
function saveState(){ try{ localStorage.setItem('craps_state', JSON.stringify({
  br:G.br, unit:G.unit, chip:G.chip, phase:G.phase, point:G.point, dice:G.dice, rollNum:G.rollNum,
  bets:G.bets, preCycleBr:G.preCycleBr, cyc:G.cyc, cycleWager:G.cycleWager, cycleBad:G.cycleBad,
  optBr:G.optBr, gs:G.gs, log:G.log.slice(0,40), msgs:G.msgs })); }catch(e){} }
function loadState(){ try{ var s=JSON.parse(localStorage.getItem('craps_state')); if(!s)return;
  for(var k in s){ if(k in G) G[k]=s[k]; }
  if(!G.bets) G.bets=freshBets();
}catch(e){} }

// ── BETTING ──
function setChip(v){ G.chip=v; render(); }
function tierAllows(type){ // which bets are placeable in current phase
  if(G.phase==='comeout') return type==='pass'||type==='dont'||type==='field'||type==='any7';
  return type!=='pass'&&type!=='dont'; // once point is on: odds, place, field, props (no new line)
}
function addBet(type){
  if(!tierAllows(type)){ flash('info', BET_META[type].name+' can\'t be placed right now.'); return; }
  var amt=Math.min(G.chip, G.br); if(amt<=0)return;
  if(type==='pass'&&G.bets.dont>0){flash('info','You already have a Don\'t bet this come-out.');return;}
  if(type==='dont'&&G.bets.pass>0){flash('info','You already have a Pass bet this come-out.');return;}
  if(type==='passOdds'){ if(G.bets.pass<=0){flash('info','Make a Pass line bet first.');return;} var cap=G.bets.pass*3-G.bets.passOdds; amt=Math.min(amt,cap); if(amt<=0){flash('info','Pass odds maxed at 3×.');return;} }
  if(type==='dontOdds'){ if(G.bets.dont<=0){flash('info','Make a Don\'t bet first.');return;} var cap=G.bets.dont*3-G.bets.dontOdds; amt=Math.min(amt,cap); if(amt<=0){flash('info','Lay odds maxed at 3×.');return;} }
  G.bets[type]+=amt; G.br-=amt; G.cycleWager+=amt; if(BAD[type])G.cycleBad+=amt;
  render();
}
function clearComeOut(){ if(G.phase!=='comeout')return; var ks=['pass','dont','field','any7']; ks.forEach(function(k){G.br+=G.bets[k];G.cycleWager-=G.bets[k];G.bets[k]=0;}); render(); }
function flash(kind,text){ G.msgs=[{kind:kind,text:text}]; }

// ── ROLL / RESOLVE ──
function anyBet(){ for(var k in G.bets) if(G.bets[k]>0) return true; return false; }
function roll(){
  if(!anyBet()){ flash('info','Place at least one bet first.'); render(); return; }
  var d=rollDice(), t=d[0]+d[1]; G.dice=d; G.rollNum++;
  var R=[]; // result messages this roll
  if(G.phase==='comeout'){
    // start a new cycle: snapshot bankroll + set optimal shadow
    G.preCycleBr=G.br + stakedOnFelt();   // bankroll value including chips currently committed (for net calc)
    var line = G.bets.pass>0?G.bets.pass:G.bets.dont, side=G.bets.dont>0?'dont':'pass';
    G.cyc={ hadLine: line>0, side: line>0?side:'pass', line: line>0?line:G.unit, pointSet:false };
  }
  resolveOneRoll(t,d,R);                   // field + any7 every roll
  if(G.phase==='comeout'){
    if(t===7||t===11){ lineComeout(true,t,R); endCycle(R,t); }
    else if(t===2||t===3){ lineComeout(false,t,R); endCycle(R,t); }
    else if(t===12){ if(G.bets.dont>0){G.br+=G.bets.dont; R.push(['info','Come-out 12 — Don\'t pushes (bar 12).']);} if(G.bets.pass>0){R.push(['loss','Come-out 12 — Pass loses -$'+G.bets.pass]);} G.bets.pass=0;G.bets.dont=0; endCycle(R,t); }
    else { G.point=t; G.phase='point'; G.cyc.pointSet=true; R.push(['info','Point is '+t+'. Back your line with full odds (0% house edge).']); }
  } else {
    resolvePointRoll(t,d,R);               // place/hard
    if(t===G.point){ linePoint(true,R); endCycle(R,t); }
    else if(t===7){ linePoint(false,R); R.push(['loss','Seven out — place & prop bets down.']); endCycle(R,t); }
    else { R.push(['info',t+' — no line decision. Roll again.']); }
  }
  G.msgs=R.map(function(x){return {kind:x[0],text:x[1]};});
  logRoll(d,t,R);
  render();
}
function stakedOnFelt(){ var s=0; for(var k in G.bets) s+=G.bets[k]; return s; }

function resolveOneRoll(t,d,R){
  if(G.bets.field>0){ var f=G.bets.field;
    if(t===2){ G.br+=f+win(f,[2,1]); R.push(['win','Field 2 — +$'+win(f,[2,1])]); }
    else if(t===12){ G.br+=f+win(f,[3,1]); R.push(['win','Field 12 — +$'+win(f,[3,1])]); }
    else if(t===3||t===4||t===9||t===10||t===11){ G.br+=f*2; R.push(['win','Field '+t+' — +$'+f]); }
    else { R.push(['loss','Field loses ('+t+') -$'+f]); }
    G.bets.field=0; }
  if(G.bets.any7>0){ var a=G.bets.any7;
    if(t===7){ G.br+=a+win(a,[4,1]); R.push(['win','Any 7 — +$'+win(a,[4,1])]); }
    else { R.push(['loss','Any 7 loses -$'+a]); }
    G.bets.any7=0; }
}
function resolvePointRoll(t,d,R){
  var hard=(d[0]===d[1]);
  ['6','8'].forEach(function(n){
    var pk='place'+n, hk='hard'+n, N=+n;
    if(G.bets[pk]>0){ if(t===N){ G.br+=win(G.bets[pk],[7,6]); R.push(['win','Place '+n+' hits — +$'+win(G.bets[pk],[7,6])+' (working)']); }
      else if(t===7){ R.push(['loss','Place '+n+' down -$'+G.bets[pk]]); G.bets[pk]=0; } }
    if(G.bets[hk]>0){ if(t===N){ if(hard){ G.br+=win(G.bets[hk],[9,1]); R.push(['win','Hard '+n+'! +$'+win(G.bets[hk],[9,1])+' (working)']); } else { R.push(['loss','Hard '+n+' loses (easy '+n+') -$'+G.bets[hk]]); G.bets[hk]=0; } }
      else if(t===7){ R.push(['loss','Hard '+n+' loses (7) -$'+G.bets[hk]]); G.bets[hk]=0; } }
  });
}
function lineComeout(passWins,t,R){
  if(G.bets.pass>0){ if(passWins){G.br+=G.bets.pass*2; R.push(['win','Pass wins ('+t+') +$'+G.bets.pass]);} else R.push(['loss','Pass loses ('+t+') -$'+G.bets.pass]); }
  if(G.bets.dont>0){ if(!passWins){G.br+=G.bets.dont*2; R.push(['win','Don\'t wins ('+t+') +$'+G.bets.dont]);} else R.push(['loss','Don\'t loses ('+t+') -$'+G.bets.dont]); }
  G.bets.pass=0;G.bets.dont=0;
}
function linePoint(pointHit,R){
  var pt=G.point;
  if(G.bets.pass>0){ if(pointHit){ G.br+=G.bets.pass*2; var w=0; if(G.bets.passOdds>0){w=win(G.bets.passOdds,oddsMult(pt));G.br+=G.bets.passOdds+w;} R.push(['win','Point '+pt+' hit — Pass +$'+(G.bets.pass+w)]); }
    else { R.push(['loss','Seven out — Pass -$'+(G.bets.pass+G.bets.passOdds)]); } }
  if(G.bets.dont>0){ if(!pointHit){ G.br+=G.bets.dont*2; var w2=0; if(G.bets.dontOdds>0){w2=win(G.bets.dontOdds,layMult(pt));G.br+=G.bets.dontOdds+w2;} R.push(['win','Seven out — Don\'t +$'+(G.bets.dont+w2)]); }
    else { R.push(['loss','Point '+pt+' hit — Don\'t -$'+(G.bets.dont+G.bets.dontOdds)]); } }
  G.bets.pass=0;G.bets.dont=0;G.bets.passOdds=0;G.bets.dontOdds=0;
}

// ── COUNTERFACTUAL: optimal-edge bettor (same line side/size, always full 3× odds, no props) ──
function optResolve(kind,t){
  var c=G.cyc, line=c.line, pass=(c.side==='pass'), pt=G.point;
  if(kind==='comeout'){
    if(pass){ if(t===7||t===11)G.optBr+=line; else if(t===2||t===3||t===12)G.optBr-=line; }
    else { if(t===7||t===11)G.optBr-=line; else if(t===2||t===3)G.optBr+=line; /* 12 push */ }
  } else if(kind==='pointHit'){
    if(pass)G.optBr+=line+win(line*3,oddsMult(pt)); else G.optBr-=line+line*3;
  } else if(kind==='sevenOut'){
    if(pass)G.optBr-=line+line*3; else G.optBr+=line+win(line*3,layMult(pt));
  }
}

// ── CYCLE END: grade + record ──
function endCycle(R,t){
  var kind = (G.phase==='comeout') ? 'comeout' : (t===G.point?'pointHit':'sevenOut');
  optResolve(kind,t);
  var net = G.br - G.preCycleBr;            // player's realized net this cycle
  var optNet;                               // optimal's net this cycle
  // recompute optNet as delta we just applied:
  optNet = G.optBr - G.gs.optBr;
  // grading
  var gc=G.gs.cat;
  gc.line.n++; if(G.cyc.hadLine)gc.line.ok++;
  var oddsTaken = false;
  if(G.cyc.pointSet && G.cyc.hadLine){ oddsTaken=true; }  // set below from snapshot
  // odds discipline only graded when a point was set and a line bet existed
  // (oddsTaken determined from whether odds were on at resolution — captured via cyc)
  if(G.cyc.pointSet && G.cyc.hadLine){ gc.odds.n++; if(G.cyc.tookOdds)gc.odds.ok++; }
  gc.edge.wagered += G.cycleWager; gc.edge.bad += G.cycleBad;
  G.gs.cycles++; G.gs.optBr=G.optBr;
  G.gs.history.push({num:G.gs.cycles, net:net, optNet:optNet, hadLine:G.cyc.hadLine, point:(kind==='comeout'?null:G.cyc.linePoint||G.point),
    wager:G.cycleWager, bad:G.cycleBad, brAfter:G.br, optAfter:Math.round(G.optBr), tookOdds:!!G.cyc.tookOdds, pointSet:G.cyc.pointSet});
  if(G.gs.history.length>120)G.gs.history=G.gs.history.slice(-120);
  // reset cycle accumulators + table
  G.phase='comeout'; G.point=null; G.bets=freshBets(); G.cycleWager=0; G.cycleBad=0;
  if(G.br<0)G.br=0;
}

// capture odds-taken at the moment of point resolution (before bets cleared)
var _linePointOrig = linePoint;
linePoint = function(pointHit,R){ G.cyc.tookOdds = (G.bets.passOdds>0||G.bets.dontOdds>0); G.cyc.linePoint=G.point; _linePointOrig(pointHit,R); };

function logRoll(d,t,R){ var head='#'+G.rollNum+' ['+d[0]+'+'+d[1]+'='+t+'] ';
  var summary=R.filter(function(x){return x[0]!=='info';}).map(function(x){return x[1];}).join(' · ')|| (R.length?R[R.length-1][1]:'');
  G.log.unshift(head+summary); if(G.log.length>40)G.log.pop(); }

function resetBankroll(){ G.br=1000; G.optBr=1000; G.bets=freshBets(); G.phase='comeout'; G.point=null;
  G.cycleWager=0; G.cycleBad=0; G.gs={cycles:0,optBr:1000,history:[],cat:{line:{ok:0,n:0},odds:{ok:0,n:0},edge:{wagered:0,bad:0}},tier:{good:0,ok:0,bad:0}};
  flash('info','Bankroll & stats reset to $1,000.'); render(); }

// ════════════ RENDER ════════════
function blendPct(){ var c=G.gs.cat; var parts=[];
  if(c.line.n)parts.push(c.line.ok/c.line.n);
  if(c.odds.n)parts.push(c.odds.ok/c.odds.n);
  if(c.edge.wagered)parts.push(1 - c.edge.bad/c.edge.wagered);
  if(!parts.length)return null; var s=0; parts.forEach(function(p){s+=p;}); return Math.round(100*s/parts.length); }

function zoneHTML(type,extra){
  var m=BET_META[type], amt=G.bets[type], on=amt>0, dis=!tierAllows(type) && !on;
  return '<div class="zone t-'+m.tier+(on?' on':'')+(dis?' dis':'')+'" onclick="addBet(\''+type+'\')">'+
    '<div class="zt">'+m.name+(extra||'')+'</div><div class="za">$'+amt+'</div><div class="zhe">'+m.he+(m.tier==='good'?'':' edge')+'</div></div>';
}

function render(){
  saveState();
  var el=document.getElementById('app');
  var pct=blendPct();
  var gap=Math.round(G.optBr-G.br);

  if(G.screen==='stats'){ el.innerHTML=statsHTML(pct,gap); return; }

  var diceH=G.dice.map(function(d){return '<div class="die">'+PIPS[d]+'</div>';}).join('');
  var msgsH=G.msgs.map(function(m){return '<div class="res res-'+m.kind+'">'+m.text+'</div>';}).join('');
  // live blended house edge of current bets
  var heNum=0,heDen=0,EDGE={pass:1.41,dont:1.36,passOdds:0,dontOdds:0,place6:1.52,place8:1.52,field:2.78,any7:16.7,hard6:9.1,hard8:9.1};
  for(var k in G.bets){ if(G.bets[k]>0){ heNum+=G.bets[k]*EDGE[k]; heDen+=G.bets[k]; } }
  var blendHE = heDen? (heNum/heDen).toFixed(2)+'%' : '—';

  var pass=G.bets.pass>0, dont=G.bets.dont>0;
  var hint = G.phase==='comeout'
    ? 'Come-out: bet the <strong>Pass</strong> or <strong>Don\'t Pass</strong> line (~1.4% edge). Avoid Field & props.'
    : 'Point is <strong>'+G.point+'</strong>. Tap <strong>'+(dont?'Lay odds':'Pass odds')+'</strong> to back your line at full 3× — <strong>0% house edge</strong>.';

  var zonesH;
  if(G.phase==='comeout'){
    zonesH = zoneHTML('pass')+zoneHTML('dont')+zoneHTML('field')+zoneHTML('any7');
  } else {
    var oddsZone = dont? zoneHTML('dontOdds',' (max $'+(G.bets.dont*3)+')') : zoneHTML('passOdds',' (max $'+(G.bets.pass*3)+')');
    zonesH = oddsZone+zoneHTML('field')+zoneHTML('place6')+zoneHTML('place8')+zoneHTML('hard6')+zoneHTML('hard8')+zoneHTML('any7');
  }

  var chips=[5,25,100].map(function(v){return '<span class="chip chip-'+v+(G.chip===v?' sel':'')+'" onclick="setChip('+v+')">$'+v+'</span>';}).join('');

  el.innerHTML=
    '<div class="topbar"><div><div class="bankroll-main">$'+G.br.toLocaleString()+'</div>'+
      '<div class="bankroll-sub">Optimal: <b style="color:'+(gap>0?'#e74c3c':gap<0?'#2ecc71':'#8888aa')+'">$'+Math.round(G.optBr).toLocaleString()+'</b>'+
        (pct!==null?' &nbsp;<b style="color:'+(pct>=85?'#2ecc71':pct>=65?'#f39c12':'#e74c3c')+'">'+pct+'% bets</b>':'')+'</div></div>'+
      '<button class="nav-btn" onclick="G.screen=\'stats\';render()">📊 Stats'+(G.gs.cycles?' ('+G.gs.cycles+')':'')+'</button></div>'+
    '<div class="felt">'+
      '<div class="statline"><span>Roll #'+G.rollNum+'</span><span class="point-pill '+(G.point?'point-on':'point-off')+'">'+(G.point?'POINT '+G.point:'COME-OUT')+'</span></div>'+
      '<div class="dice-row">'+diceH+'</div>'+
      '<div class="he-read">Blended house edge of your bets: <b>'+blendHE+'</b></div>'+
      '<div class="zones">'+zonesH+'</div>'+
    '</div>'+
    '<div class="hint">💡 '+hint+'</div>'+
    msgsH+
    '<div class="controls">'+
      '<div class="row"><span class="lbl">Chip:</span>'+chips+
        (G.phase==='comeout'?'<button class="btn btn-action" style="padding:9px 14px;font-size:13px;min-height:0" onclick="clearComeOut()">Clear bets</button>':'')+
        '<button class="btn btn-action" style="padding:9px 14px;font-size:13px;min-height:0;border-color:#553399;color:#cc99ff" onclick="resetBankroll()">Reset $1k</button>'+
      '</div>'+
      '<div class="row"><button class="btn btn-roll" onclick="roll()">🎲 Roll'+(G.phase==='comeout'?' come-out':'')+'</button>'+
        '<span class="lbl">Tap a zone above to bet the selected chip.</span></div>'+
      '<div class="log">'+G.log.slice(0,12).map(function(l){return '<div>'+l+'</div>';}).join('')+'</div>'+
    '</div>'+
    '<div class="foot">Bubble craps · single shooter · 3× odds · pass/don\'t + odds graded vs an optimal-edge bettor (same dice). Bets resolve within the current point cycle.</div>';
}

function statsHTML(pct,gap){
  var g=G.gs;
  var cat=[['line','Line discipline','Had a pass/don\'t bet'],['odds','Odds discipline','Took odds on your point'],['edge','Edge avoidance','$ kept off sucker bets']];
  var catH=cat.map(function(c){
    var key=c[0], p, sub;
    if(key==='edge'){ var w=g.cat.edge.wagered; p=w?Math.round(100*(1-g.cat.edge.bad/w)):null; sub=w?('$'+g.cat.edge.bad+' of $'+w+' on bad bets'):'No bets yet'; }
    else { var cs=g.cat[key]; p=cs.n?Math.round(100*cs.ok/cs.n):null; sub=cs.n?(cs.ok+'/'+cs.n):'No data'; }
    var col=p===null?'#4466aa':p>=85?'#27ae60':p>=65?'#e67e22':'#e74c3c';
    return '<div class="cat-top"><span style="color:#a0b8d0;font-size:13px">'+c[1]+'</span><span style="font-weight:700;font-size:13px;color:'+col+'">'+(p!==null?p+'%':'—')+'<span style="color:#4466aa;font-weight:400"> · '+sub+'</span></span></div><div class="pbar"><div class="pbar-fill" style="width:'+(p||0)+'%;background:'+col+'"></div></div>';
  }).join('');
  var hist=g.history.slice().reverse().slice(0,15).map(function(h){
    return '<div class="hist-row"><span style="color:#6688aa">#'+h.num+(h.pointSet?' · pt '+(h.point||'?'):' · come-out')+'</span><span style="font-weight:700;color:'+(h.net>0?'#2ecc71':h.net<0?'#e74c3c':'#6688aa')+'">'+(h.net>=0?'+$':'-$')+Math.abs(h.net)+'</span></div>';
  }).join('')||'<div style="color:#6688aa;font-size:12px">No rounds yet.</div>';
  return '<div class="stats-page"><div class="stats-hdr"><button class="back-link" onclick="G.screen=\'game\';render()">← back</button>'+
    '<h2 style="font-size:18px;font-weight:700">Performance Stats</h2></div>'+
    '<div class="stat-cards">'+
      '<div class="stat-card"><div class="sc-label">Your bankroll</div><div class="sc-val '+(G.br>=1000?'c-green':'c-red')+'">$'+G.br.toLocaleString()+'</div><div class="sc-sub">'+(G.br-1000>=0?'+':'')+'$'+(G.br-1000)+' vs start</div></div>'+
      '<div class="stat-card"><div class="sc-label">Optimal bankroll</div><div class="sc-val '+(G.optBr>=1000?'c-green':'c-red')+'">$'+Math.round(G.optBr).toLocaleString()+'</div><div class="sc-sub">same dice, perfect bets</div></div>'+
      '<div class="stat-card"><div class="sc-label">Bet quality</div><div class="sc-val '+(pct===null?'c-muted':pct>=85?'c-green':pct>=65?'c-amber':'c-red')+'">'+(pct!==null?pct+'%':'—')+'</div><div class="sc-sub">'+g.cycles+' rounds</div></div>'+
    '</div>'+
    (g.cycles>0&&gap!==0?'<div class="gap-banner" style="background:'+(gap>0?'#2c0f0f':'#0d3320')+';color:'+(gap>0?'#e74c3c':'#2ecc71')+';border:1px solid '+(gap>0?'#a32d2d':'#1e8449')+'">'+
      (gap>0?'📉 Perfect bet selection would have you $'+gap+' richer over '+g.cycles+' rounds':'📈 You\'re running $'+Math.abs(gap)+' ahead of optimal — variance, not edge')+'</div>':'')+
    '<div class="section"><h3>Betting discipline</h3>'+catH+'</div>'+
    '<div class="section"><h3>Recent rounds</h3>'+hist+'</div>'+
    '<button class="reset-link" onclick="resetBankroll()">Reset bankroll & stats</button></div>';
}

// ── KEYBOARD ──
document.addEventListener('keydown',function(e){
  if(e.metaKey||e.ctrlKey||e.altKey)return; var tag=e.target&&e.target.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(G.screen!=='game')return;
  if(e.key===' '||e.key==='Enter'||e.key.toLowerCase()==='r'){ e.preventDefault(); roll(); }
});

loadState();
render();

// ── PWA ──
(function(){ var c=document.createElement('canvas'); c.width=c.height=180; var x=c.getContext('2d');
  x.fillStyle='#1b6332'; x.beginPath(); x.roundRect(0,0,180,180,28); x.fill();
  x.fillStyle='#fff'; x.beginPath(); x.roundRect(34,34,52,52,10); x.roundRect(96,96,52,52,10); x.fill();
  x.fillStyle='#c0392b'; [ [60,60] ].forEach(function(p){x.beginPath();x.arc(p[0],p[1],8,0,7);x.fill();});
  x.fillStyle='#1a1a1a'; [[110,118],[122,130],[134,142],[110,142],[134,118]].forEach(function(p){x.beginPath();x.arc(p[0],p[1],6,0,7);x.fill();});
  var l=document.createElement('link'); l.rel='apple-touch-icon'; l.href=c.toDataURL('image/png'); document.head.appendChild(l);
})();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
