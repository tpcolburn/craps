<body>
<div id="rotate"><div class="ph">&#128241;</div><h2>ROTATE TO PLAY</h2><p>The craps table is built for landscape. Turn your device sideways to take a seat.</p></div>
<div id="app"></div>
<script>
/* ════════════════════════════════════════════════════════════════
   CRAPS ENGINE — verified by node harness (unit + Monte-Carlo edge +
   conservation tests). applyRoll(S,[d1,d2]) mutates S and returns
   {total,hard,msgs,cycleEnded,pointSet,line}. 3-4-5x odds. Stake is
   assumed already deducted at placement; engine only adds winnings /
   returned stakes back to S.br.
   ════════════════════════════════════════════════════════════════ */
function W(stake,n,d){return Math.floor(stake*n/d);}
function oddsPay(p){return (p===4||p===10)?[2,1]:(p===5||p===9)?[3,2]:[6,5];}
function layPay(p){return (p===4||p===10)?[1,2]:(p===5||p===9)?[2,3]:[5,6];}
function placePay(n){return (n===4||n===10)?[9,5]:(n===5||n===9)?[7,5]:[7,6];}
function oddsCapMult(p){return (p===4||p===10)?3:(p===5||p===9)?4:5;}
function freshBets(){
  return {
    pass:0,passOdds:0,dont:0,dontOdds:0,
    field:0,any7:0,anyCraps:0,c2:0,c3:0,c11:0,c12:0,big6:0,big8:0,
    place:{4:0,5:0,6:0,8:0,9:0,10:0},
    hard:{4:0,6:0,8:0,10:0},
    come:{box:0,pts:{4:{f:0,o:0},5:{f:0,o:0},6:{f:0,o:0},8:{f:0,o:0},9:{f:0,o:0},10:{f:0,o:0}}},
    dcome:{box:0,pts:{4:{f:0,o:0},5:{f:0,o:0},6:{f:0,o:0},8:{f:0,o:0},9:{f:0,o:0},10:{f:0,o:0}}}
  };
}
function oneRoll(S,k,wins,n,den,R,label){
  var s=S.bets[k]; if(s<=0) return;
  if(wins){var w=W(s,n,den); S.br+=s+w; R.push({kind:'win',text:label+' +$'+w});}
  else{R.push({kind:'lose',text:label+' \u2212$'+s});}
  S.bets[k]=0;
}
function returnStanding(S,R){
  var b=S.bets,ret=0;
  [4,5,6,8,9,10].forEach(function(n){if(b.place[n]>0){ret+=b.place[n];b.place[n]=0;}});
  [4,6,8,10].forEach(function(n){if(b.hard[n]>0){ret+=b.hard[n];b.hard[n]=0;}});

function applyRoll(S,d){

      else{R.push({kind:'lose',text:'Hard '+n+' (easy) \u2212$'+s});b.hard[n]=0;} }

  });

      else if(t===7){R.push({kind:'lose',text:'Come '+n+' (7) \u2212$'+(cp.f+cp.o)});cp.f=0;cp.o=0;} }
    var dp=b.dcome.pts[n];
    if(dp.f>0){ if(t===7){var lp=layPay(n);var lw=dp.o>0?W(dp.o,lp[0],lp[1]):0;S.br+=dp.f*2+dp.o+lw;R.push({kind:'win',text:'DC '+n+' (7) +$'+(dp.f+lw)});dp.f=0;dp.o=0;}
      else if(t===n){R.push({kind:'lose',text:'DC '+n+' \u2212$'+(dp.f+dp.o)});dp.f=0;dp.o=0;} }
  });
  if(b.come.box>0){var c=b.come.box;
    if(t===7||t===11){S.br+=c*2;R.push({kind:'win',text:'Come ('+t+') +$'+c});}
    else if(t===2||t===3||t===12){R.push({kind:'lose',text:'Come ('+t+') \u2212$'+c});}

      if(b.dont>0){R.push({kind:'lose',text:'Point '+pt+' \u2014 Don\u2019t \u2212$'+(b.dont+b.dontOdds)});line.dont='lose';}

/* ── helpers ── */

function eachBet(cb){

  ['pass','passOdds','dont','dontOdds','field','any7','anyCraps','c2','c3','c11','c12','big6','big8'].forEach(function(k){ if(b[k]>0) cb(k,b[k]); });

/* clear removable (non-contract) bets */
function clearBets(){
  if(G._rolling) return; var refunded=0,b=G.bets;
  function take(id,amt,zero){ refunded+=amt; G.br+=amt; G.cycleWager-=amt; if(BAD[id]) G.cycleBad-=amt; zero(); }
  if(G.phase==='comeout'){ if(b.pass>0) take('pass',b.pass,function(){b.pass=0;}); if(b.dont>0) take('dont',b.dont,function(){b.dont=0;}); }
  if(b.field>0) take('field',b.field,function(){b.field=0;});
  ['any7','anyCraps','c2','c3','c11','c12','big6','big8'].forEach(function(k){ if(b[k]>0) take(k,b[k],function(){b[k]=0;}); });
  [4,5,6,8,9,10].forEach(function(n){ if(b.place[n]>0) take('place'+n,b.place[n],function(){b.place[n]=0;}); });
  [4,6,8,10].forEach(function(n){ if(b.hard[n]>0) take('hard'+n,b.hard[n],function(){b.hard[n]=0;}); });
  if(b.passOdds>0) take('passOdds',b.passOdds,function(){b.passOdds=0;});
  if(b.dontOdds>0) take('dontOdds',b.dontOdds,function(){b.dontOdds=0;});
  [4,5,6,8,9,10].forEach(function(n){ if(b.come.pts[n].o>0) take('comeOdds',b.come.pts[n].o,function(){b.come.pts[n].o=0;}); if(b.dcome.pts[n].o>0) take('dcomeOdds',b.dcome.pts[n].o,function(){b.dcome.pts[n].o=0;}); });

/* ── grading at cycle end ── */
function gradeCycle(net,optNet){
  var gc=G.gs.cat;
  gc.line.n++; if(G.cyc.hadLine) gc.line.ok++;
  if(G.cyc.pointSet && G.cyc.hadLine){ gc.odds.n++; if(G.cyc.tookOdds) gc.odds.ok++; }
  gc.edge.wagered+=G.cycleWager; gc.edge.bad+=G.cycleBad;
  G.gs.cycles++;
  G.gs.history.push({num:G.gs.cycles,net:Math.round(net),optNet:Math.round(optNet),
    hadLine:G.cyc.hadLine,tookOdds:!!G.cyc.tookOdds,pointSet:!!G.cyc.pointSet,wager:G.cycleWager,bad:G.cycleBad});
  if(G.gs.history.length>150) G.gs.history=G.gs.history.slice(-150);
  G.gs.optBr=G.opt.br;
  G.cycleWager=0; G.cycleBad=0;
}
function blendPct(){ var c=G.gs.cat,parts=[];
  if(c.line.n) parts.push(c.line.ok/c.line.n);
  if(c.odds.n) parts.push(c.odds.ok/c.odds.n);
  if(c.edge.wagered) parts.push(1-c.edge.bad/c.edge.wagered);
  if(!parts.length) return null; var s=0; parts.forEach(function(p){s+=p;}); return Math.round(100*s/parts.length); }

/* ── ROLL ── */
function stakedOnFelt(){ return atRisk(); }
function roll(){
  if(G._rolling) return;
  if(G.phase==='comeout' && !anyBet()){ toast('info','Place a line bet before the come-out roll.'); render(); return; }
  var d=[d6(),d6()];
  // cycle-start bookkeeping (player + shadow) on come-out
  if(G.phase==='comeout'){
    G.preCycleBr=G.br+stakedOnFelt();
    G.cyc={ hadLine:(G.bets.pass>0||G.bets.dont>0), side:(G.bets.dont>0?'dont':'pass'),
            lineAmt:(G.bets.pass>0?G.bets.pass:(G.bets.dont>0?G.bets.dont:G.unit)), pointSet:false, tookOdds:false };
    G.optPreCycle=G.opt.br;
    shadowPlaceLine();
  }
  shadowMaxOdds();
  if(G.phase==='point' && ((G.bets.pass>0&&G.bets.passOdds>0)||(G.bets.dont>0&&G.bets.dontOdds>0))) G.cyc.tookOdds=true;
  var pr=applyRoll(G,d);
  applyRoll(G.opt,d);
  G.dice=d; G.rollNum++; G._anim=true;
  if(pr.pointSet) G.cyc.pointSet=true;
  // messages + log
  G.msgs=pr.msgs.slice(-5);
  if(G.br<0) G.br=0;
  if(pr.cycleEnded){
    var net=G.br-G.preCycleBr, optNet=G.opt.br-G.optPreCycle;
    gradeCycle(net,optNet); G.lastNet=Math.round(net);
  } else { G.lastNet=null; }

  saveState();
  // brief roll lock + dice tumble
  G._rolling=true; render();
  setTimeout(function(){ G._rolling=false; render(); }, 430);
}
function logRoll(d,pr){
  var head='#'+G.rollNum+' ['+d[0]+'+'+d[1]+'='+pr.total+'] ';
  var notes=pr.msgs.filter(function(m){return m.kind!=='info';}).map(function(m){return m.text;}).join(' \u00b7 ');
  if(!notes && pr.msgs.length) notes=pr.msgs[pr.msgs.length-1].text;
  G.log.unshift(head+(notes||'')); if(G.log.length>50) G.log.pop();
}
function resetAll(){
  var fresh=newState(); fresh.chip=G.chip; fresh.unit=G.unit;
  for(var k in fresh){ G[k]=fresh[k]; }
  toast('info','Bankroll & stats reset to $1,000.'); render();
}
/* ════════════════════════════════════════════════════════════════
   RENDER — landscape table
   ════════════════════════════════════════════════════════════════ */
function pips(v){
  var map={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
  var on=map[v]||[],s=''; for(var i=0;i<9;i++){ s+='<i'+(on.indexOf(i)>=0?' class="on"':'')+'></i>'; } return s;
}
function dieHTML(v,anim){ return '<div class="die'+(anim?' shake':'')+'"><div class="pg">'+pips(v)+'</div></div>'; }
function betChip(amt,sizeCls,posCls,tag){
  return '<div class="bchip '+sizeCls+' '+chipCls(amt)+' '+posCls+'">'+(tag?'<span class="tg">'+tag+'</span>':'')+fmtChip(amt)+'</div>';
}
function lineChip(amt,tag){
  return '<div class="bchip sz-f '+chipCls(amt)+'" style="bottom:2px;left:8px"><span class="tg">'+tag+'</span>'+fmtChip(amt)+'</div>';
}
function numChips(n){
  var b=G.bets,h='';
  var cf=b.come.pts[n].f, co=b.come.pts[n].o;
  if(cf>0){ h+='<span style="position:absolute;top:3px;left:3px;z-index:6;cursor:pointer" onclick="event.stopPropagation();betComeOdds('+n+')">'
    +'<div class="bchip sz-f '+chipCls(cf)+'" style="position:relative;top:0;left:0"><span class="tg">C</span>'+fmtChip(cf)+'</div>'
    +(co>0?'<div class="bchip sz-o '+chipCls(co)+'" style="position:absolute;top:15px;left:15px">'+fmtChip(co)+'</div>':'')+'</span>'; }
  var df=b.dcome.pts[n].f, dor=b.dcome.pts[n].o;
  if(df>0){ h+='<span style="position:absolute;top:3px;right:3px;z-index:6;cursor:pointer" onclick="event.stopPropagation();betDcomeOdds('+n+')">'
    +'<div class="bchip sz-f '+chipCls(df)+'" style="position:relative;top:0;left:0"><span class="tg">D</span>'+fmtChip(df)+'</div>'
    +(dor>0?'<div class="bchip sz-o '+chipCls(dor)+'" style="position:absolute;top:15px;right:15px">'+fmtChip(dor)+'</div>':'')+'</span>'; }
  if(b.place[n]>0){ h+=betChip(b.place[n],'sz-f','cstack-place','P'); }
  return h;
}
function numBox(n){
  var word=n===6?'SIX':n===9?'NINE':(''+n);
  var co=G.phase==='comeout', isPoint=(!co&&G.point===n), live=!co;
  var tier=(n===6||n===8)?'t-ok':(n===5||n===9)?'t-weak':'t-bad';
  var cls='cell numbox '+tier+(isPoint?' pointbox':'')+(G.bets.place[n]>0?' has':'')+(live?' live':' dis');
  return '<div class="'+cls+'"'+(live?' onclick="betPlace('+n+')"':'')+'>'
    +(isPoint?'<div class="puck on">ON</div>':'')
    +'<div class="nlab">'+word+'</div><div class="pstrip">place</div>'+numChips(n)+'</div>';
}

function gameHTML(){
  var co=G.phase==='comeout';
  var pct=blendPct(), gap=Math.round(G.opt.br-G.br);
  var optCol=gap>0?'#ec5b4c':gap<0?'#39d07f':'#6f8f7c';
  var qcol=pct===null?'#6f8f7c':pct>=85?'#39d07f':pct>=65?'#f0c040':'#ec5b4c';

  /* TOP BAR */
  var top='<div class="top"><div class="brk"><div class="v">$'+fmt(G.br)+'</div>'
    +'<div class="s">Optimal <b style="color:'+optCol+'">$'+fmt(G.opt.br)+'</b></div></div>'
    +'<div class="spacer"></div>'
    +'<div class="qpill" style="color:'+qcol+';border-color:'+qcol+'">'+(pct!==null?pct+'% bets':'Bet quality')+'</div>'
    +'<button class="btn navb" onclick="G.screen=\'stats\';render()">Stats'+(G.gs.cycles?' ('+G.gs.cycles+')':'')+'</button></div>';

  /* FELT */
  var nums=''; [4,5,6,8,9,10].forEach(function(n){ nums+=numBox(n); });

  var dcBox='<div class="cell dc t-good'+(G.bets.dcome.box>0?' has':'')+(co?' dis':' live')+'"'+(co?'':' onclick="betDcome()"')
    +'><span class="lab">DON\u2019T COME</span>'+(G.bets.dcome.box>0?betChip(G.bets.dcome.box,'sz-f','cstack-mid','D'):'')+'</div>';
  var comeBar='<div class="cell come t-good'+(G.bets.come.box>0?' has':'')+(co?' dis':' live')+'"'+(co?'':' onclick="betCome()"')
    +'><span class="lab">COME</span>'+(G.bets.come.box>0?betChip(G.bets.come.box,'sz-f','cstack-mid','C'):'')+'</div>';

  var fieldZone='<div class="cell field t-weak'+(G.bets.field>0?' has':'')+' live" onclick="betField()">'
    +'<div class="ftitle">FIELD</div><div class="fnums">'
    +'<span class="fn dbl">2<small>2:1</small></span><span class="fn">3</span><span class="fn">4</span>'
    +'<span class="fn">9</span><span class="fn">10</span><span class="fn">11</span>'
    +'<span class="fn dbl">12<small>3:1</small></span></div>'
    +(G.bets.field>0?betChip(G.bets.field,'sz-f','cstack-mid',null):'')+'</div>';

  function hardCell(n){ var pay=(n===4||n===10)?'7:1':'9:1';
    return '<div class="cell hard t-bad'+(G.bets.hard[n]>0?' has':'')+' live" onclick="betHard('+n+')">'
      +'<div class="hl" style="font-size:11px;color:var(--cream);font-weight:700;letter-spacing:.5px">HARD '+n+'</div>'
      +'<div class="hl">'+pay+'</div>'+(G.bets.hard[n]>0?betChip(G.bets.hard[n],'sz-o','cstack-mid',null):'')+'</div>'; }
  function crapsCell(id,label,pay,tier){
    return '<div class="cell cnum '+tier+(G.bets[id]>0?' has':'')+' live" onclick="betProp(\''+id+'\')">'
      +'<span class="cn">'+label+'</span><span class="cp">'+pay+'</span>'+(G.bets[id]>0?betChip(G.bets[id],'sz-o','cstack-mid',null):'')+'</div>'; }
  var props='<div class="props">'
    +'<div class="cell any7 t-worst'+(G.bets.any7>0?' has':'')+' live" onclick="betProp(\'any7\')"><span class="lab">ANY 7 &middot; 4:1</span>'+(G.bets.any7>0?betChip(G.bets.any7,'sz-o','cstack-mid',null):'')+'</div>'
    +'<div class="hards">'+hardCell(4)+hardCell(10)+hardCell(6)+hardCell(8)+'</div>'
    +'<div class="craps4">'+crapsCell('c2','2','30:1','t-worst')+crapsCell('c3','3','15:1','t-bad')+crapsCell('c11','11','15:1','t-bad')+crapsCell('c12','12','30:1','t-worst')+'</div>'
    +'</div>';

  var bigs='<div class="bigs">'
    +'<div class="cell big t-bad'+(G.bets.big6>0?' has':'')+' live" onclick="betBig(6)"><span class="lab">BIG 6</span>'+(G.bets.big6>0?betChip(G.bets.big6,'sz-o','cstack-mid',null):'')+'</div>'
    +'<div class="cell big t-bad'+(G.bets.big8>0?' has':'')+' live" onclick="betBig(8)"><span class="lab">BIG 8</span>'+(G.bets.big8>0?betChip(G.bets.big8,'sz-o','cstack-mid',null):'')+'</div></div>';

  var dpass='<div class="cell dpass t-good'+(G.bets.dont>0?' has':'')+(co?' live':' dis')+'"'+(co?' onclick="betLine(\'dont\')"':'')
    +'><span class="lab">DON\u2019T PASS BAR</span>'+(G.bets.dont>0?lineChip(G.bets.dont,'D'):'')+'</div>';
  var hasOdds=(G.bets.passOdds>0||G.bets.dontOdds>0);
  var oddsLbl=G.bets.dont>0?'LAY ODDS':'PASS ODDS';
  var oddsbar='<div class="cell oddsbar t-great'+(hasOdds?' has':'')+(co?' dis':' live')+'"'+(co?'':' onclick="betLineOdds()"')
    +'><span class="lab">'+oddsLbl+' &middot; 0% EDGE</span>'+(G.bets.passOdds>0?lineChip(G.bets.passOdds,'O'):'')+(G.bets.dontOdds>0?lineChip(G.bets.dontOdds,'LO'):'')+'</div>';
  var passLine='<div class="cell pass t-good'+(G.bets.pass>0?' has':'')+(co?' live':' dis')+'"'+(co?' onclick="betLine(\'pass\')"':'')
    +'><span class="lab">PASS LINE</span>'+(G.bets.pass>0?lineChip(G.bets.pass,'P'):'')+'</div>';

  var tray='<div class="tray">'+dieHTML(G.dice[0],G._anim)+dieHTML(G.dice[1],G._anim)+'</div>';
  var offpuck=co?'<div class="puck off puck-off-slot">OFF</div>':'';

  var toastH='<div class="toast">';
  G.msgs.forEach(function(m){ toastH+='<div class="msg m-'+m.kind+'">'+m.text+'</div>'; });
  if(G.lastNet!==null){ var nc=G.lastNet>0?'#39d07f':G.lastNet<0?'#ec5b4c':'#a9c4b5';
    toastH+='<div class="netbadge" style="color:'+nc+';border-color:'+nc+';background:rgba(8,20,14,.92)">Cycle net '+(G.lastNet>=0?'+$':'\u2212$')+Math.abs(G.lastNet)+'</div>'; }
  toastH+='</div>';

  var felt='<div class="rail"><div class="felt">'
    +'<div class="nums">'+nums+'</div>'
    +'<div class="r2">'+dcBox+comeBar+'</div>'
    +'<div class="mid">'+fieldZone+props+bigs+'</div>'
    +dpass+oddsbar+passLine
    +tray+offpuck+toastH
    +'</div></div>';
  G._anim=false;

  /* BOTTOM RAIL */
  var chips='<div class="chips">'+CHIPS.map(function(v){
    return '<div class="chip '+chipCls(v)+(G.chip===v?' sel':'')+'" onclick="setChip('+v+')"><span class="ring"></span>$'+v+'</div>';
  }).join('')+'</div>';
  var tip=co
    ? 'Bet PASS or DON\u2019T (~1.4%). Skip Field &amp; props.'
    : (G.bets.pass>0||G.bets.dont>0)
       ? 'Point '+G.point+': tap '+(G.bets.dont>0?'LAY':'PASS')+' ODDS \u2014 0% edge.'
       : 'Point '+G.point+': COME + odds mirrors the line.';
  var phLine=co?'<span class="co">COME-OUT</span>':'<span class="pn">POINT '+G.point+'</span>';
  var readout='<div class="readout"><div class="ph">'+phLine+'</div>'
    +'<div class="ar">At risk <b>$'+atRisk()+'</b> &middot; edge <b>'+blendHE()+'</b></div>'
    +'<span class="tip">'+tip+'</span></div>';
  var actcol='<div class="actcol">'
    +'<button class="btn minib" onclick="clearBets()"'+(G._rolling?' disabled':'')+'>Clear</button>'
    +'<button class="btn rollb" onclick="roll()"'+(G._rolling?' disabled':'')+'>ROLL</button></div>';
  var bot='<div class="bot">'+chips+readout+actcol+'</div>';

  return top+felt+bot;
}

function fitFelt(){
  var rail=document.querySelector('.rail'); if(!rail) return;
  var felt=rail.querySelector('.felt'); if(!felt) return;
  var cs=getComputedStyle(rail);
  var availW=rail.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight);
  var availH=rail.clientHeight-parseFloat(cs.paddingTop)-parseFloat(cs.paddingBottom);
  var FW=felt.offsetWidth||980, FH=felt.offsetHeight||384;
  var s=Math.min(availW/FW, availH/FH);
  if(s>0&&isFinite(s)) felt.style.transform='scale('+s+')';
}
function render(){
  saveState();
  var el=document.getElementById('app');
  if(G.screen==='stats'){ el.innerHTML=statsHTML(); return; }
  el.innerHTML=gameHTML();
  fitFelt(); requestAnimationFrame(fitFelt);
}
/* ════════════════════════════════════════════════════════════════
   STATS PAGE
   ════════════════════════════════════════════════════════════════ */
function statsHTML(){
  var g=G.gs, pct=blendPct(), gap=Math.round(G.opt.br-G.br);
  var cats=[['line','Line discipline','Had a Pass / Don\u2019t bet'],['odds','Odds discipline','Took free odds on your point'],['edge','Edge avoidance','Bankroll kept off sucker bets']];
  var catH=cats.map(function(c){
    var key=c[0],p,sub;
    if(key==='edge'){ var w=g.cat.edge.wagered; p=w?Math.round(100*(1-g.cat.edge.bad/w)):null; sub=w?('$'+g.cat.edge.bad+' of $'+w+' on bad bets'):'No wagers yet'; }
    else { var cs=g.cat[key]; p=cs.n?Math.round(100*cs.ok/cs.n):null; sub=cs.n?(cs.ok+' / '+cs.n+' rounds'):'No data yet'; }
    var col=p===null?'#6f8f7c':p>=85?'#39d07f':p>=65?'#f0c040':'#ec5b4c';
    return '<div class="catrow"><span style="color:#cfe0d6">'+c[1]+'</span><span style="font-weight:700;color:'+col+'">'+(p!==null?p+'%':'\u2014')+'<span style="color:#6f8f7c;font-weight:400"> &middot; '+sub+'</span></span></div><div class="bar"><div style="width:'+(p||0)+'%;background:'+col+'"></div></div>';
  }).join('');
  var hist=g.history.slice().reverse().slice(0,16).map(function(h){
    var tags=[]; if(!h.hadLine) tags.push('no line'); if(h.pointSet&&h.hadLine&&!h.tookOdds) tags.push('no odds'); if(h.bad>0) tags.push('$'+h.bad+' bad');
    var tg=tags.length?' &middot; '+tags.join(', '):'';
    return '<div class="histrow"><span style="color:#6f8f7c">#'+h.num+tg+'</span><span style="font-weight:700;color:'+(h.net>0?'#39d07f':h.net<0?'#ec5b4c':'#6f8f7c')+'">'+(h.net>=0?'+$':'\u2212$')+Math.abs(h.net)+'</span></div>';
  }).join('')||'<div style="color:#6f8f7c;font-size:12px">No rounds played yet.</div>';
  var bannerH='';
  if(g.cycles>0 && gap!==0){
    bannerH=gap>0
      ? '<div class="banner" style="background:#2c0f0f;color:#ec5b4c;border:1px solid #a3261a">Perfect bet selection would have you $'+gap+' richer across '+g.cycles+' rounds \u2014 the cost of off-strategy bets.</div>'
      : '<div class="banner" style="background:#0d3320;color:#39d07f;border:1px solid #1e8449">You\u2019re $'+Math.abs(gap)+' ahead of optimal \u2014 good variance, not a better edge. It evens out.</div>';
  }
  var legend='<div class="sect"><h3>Bet quality key (felt edge colors)</h3><div class="legend">'
    +'<span><i style="background:#7af0b0"></i>0% odds</span><span><i style="background:#39d07f"></i>line ~1.4%</span>'
    +'<span><i style="background:#5fd0c0"></i>place 6/8 1.5%</span><span><i style="background:#f0c040"></i>field/5/9</span>'
    +'<span><i style="background:#f08a3c"></i>4/10, big, hard</span><span><i style="background:#ec5b4c"></i>any 7, 2, 12</span></div></div>';
  return '<div class="stats"><div class="stats-hdr"><button class="back" onclick="G.screen=\'game\';render()">&larr; Back to table</button><h2>Performance</h2></div>'
    +'<div class="cards">'
    +'<div class="card"><div class="l">Your bankroll</div><div class="v '+(G.br>=1000?'c-green':'c-red')+'">$'+fmt(G.br)+'</div><div class="sub">'+(G.br-1000>=0?'+':'\u2212')+'$'+Math.abs(G.br-1000)+' vs start</div></div>'
    +'<div class="card"><div class="l">Optimal bankroll</div><div class="v '+(G.opt.br>=1000?'c-green':'c-red')+'">$'+fmt(G.opt.br)+'</div><div class="sub">same dice, perfect bets</div></div>'
    +'<div class="card"><div class="l">Bet quality</div><div class="v '+(pct===null?'c-muted':pct>=85?'c-green':pct>=65?'c-amber':'c-red')+'">'+(pct!==null?pct+'%':'\u2014')+'</div><div class="sub">'+g.cycles+' rounds</div></div>'
    +'</div>'+bannerH
    +'<div class="sect"><h3>Betting discipline</h3>'+catH+'</div>'
    +'<div class="sect"><h3>Recent rounds</h3>'+hist+'</div>'
    +legend
    +'<button class="resetl" onclick="resetAll()">Reset bankroll &amp; stats</button></div>';
}

/* ── keyboard: Space / Enter / R = roll ── */
document.addEventListener('keydown',function(e){
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  var tag=e.target&&e.target.tagName; if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(G.screen!=='game') return;
  if(e.key===' '||e.key==='Enter'||(e.key&&e.key.toLowerCase()==='r')){ e.preventDefault(); roll(); }
});

/* ── init ── */
loadState();
render();
window.addEventListener('resize',fitFelt);
window.addEventListener('orientationchange',function(){ setTimeout(fitFelt,200); });

(function(){ try{
  var c=document.createElement('canvas'); c.width=c.height=192; var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,192,192); g.addColorStop(0,'#1f8049'); g.addColorStop(1,'#0a3f21');

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
